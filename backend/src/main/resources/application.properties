server.port=${PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}
spring.config.import=optional:classpath:application-secrets.properties

# Database Defaults (Can be overridden by labels/profiles)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration 
app.jwt.secret=${JWT_SECRET:TaskFlowDefaultJWTSecretKey2026ForDevelopmentPurposesOnly}
app.jwt.expiration-ms=86400000

# Admin Seeder 
app.admin.password=${ADMIN_PASSWORD:Admin@123}


#  Flyway  db migration (Disabled to allow Hibernate ddl-auto=update to manage schema on empty DBs)
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=false


# ─── CORS ────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# Multipart Upload Limit
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.taskflow=${LOG_LEVEL:DEBUG}
#  API Keys & Integrations 
# Path of serviceAccountKey.json file
app.firebase.config-path=${FIREBASE_CONFIG_PATH:serviceAccountKey.json}
app.firebase.project-id=${FIREBASE_PROJECT_ID:govalert-1jsnb}

# (SMTP settings removed as Firebase Auth is used for email delivery)
