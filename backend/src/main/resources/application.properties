server.port=${PORT:8080}

# ─── Database (PostgreSQL) 
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/Task-Flow}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:kali}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── JWT Configuration ──────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:TaskFlowDefaultJWTSecretKey2026ForDevelopmentPurposesOnly}
app.jwt.expiration-ms=86400000

# ─── Admin Seeder ────────────────────────────────────────────────────
app.admin.password=${ADMIN_PASSWORD:Admin@123}

# ─── CORS ────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# ─── Logging ─────────────────────────────────────────────────────────
logging.level.com.taskflow=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=WARN
