# ─── Production Profile (prod) ──────────────────────────────────────────
# This is the default profile for Supabase and Render.

# Database Configuration (Supabase)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Render Stability Fix: Disable JDBC metadata lookups to prevent Port Scan Timeouts
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Fast-boot Hibernate properties
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.bytecode.use_reflection_optimizer=true

# Database Defaults (Can be overridden by labels/profiles)
spring.datasource.driver-class-name=org.postgresql.Driver

# Logging
logging.level.com.taskflow=INFO

# HikariCP Connection Pool Settings (For Supabase Pooler Stability)
spring.datasource.hikari.max-lifetime=280000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.keepalive-time=40000
