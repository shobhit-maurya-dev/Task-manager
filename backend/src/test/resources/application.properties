# ─── Test Profile: H2 In-Memory Database 
spring.profiles.active=test
spring.config.import=
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway during tests (schema created by Hibernate in-memory)
spring.flyway.enabled=false

#  Flyway  db migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ─── JWT (test key)
app.jwt.secret=TaskFlowTestJWTSecretKey2026ForTestingPurposesOnly1234
app.jwt.expiration-ms=86400000

# ─── Admin Seeder (test)
app.admin.password=Admin@123

# ─── Logging (quiet for tests)
logging.level.com.taskflow=WARN
logging.level.org.springframework.security=WARN

# ─── CORS (test)
app.cors.allowed-origins=http://localhost:4200
