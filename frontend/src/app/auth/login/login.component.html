<div class="min-h-screen flex flex-col lg:flex-row overflow-hidden bg-slate-50 dark:bg-slate-950">
  <!-- Left Panel — Dark Blue Branding (Hidden on mobile) -->
  <div class="hidden lg:flex lg:w-5/12 flex-col justify-center px-12 text-white relative overflow-hidden"
    style="background: linear-gradient(135deg, #1E3A8A 0%, #3B82F6 100%);">
    <!-- Abstract background circles -->
    <div class="absolute -top-24 -left-24 w-96 h-96 bg-white/10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-white/10 rounded-full blur-3xl"></div>

    <div class="relative z-10">
      <!-- Branding at the Top -->
      <div class="mb-12">
        <h1 class="text-6xl font-black mb-4 tracking-tighter text-white">TaskFlow</h1>
        <p class="text-lg text-blue-100/80 font-medium">Be Productive with TaskFlow</p>
      </div>

      <!-- Created By Credit (Moved Below Branding) -->
      <div class="pt-8 border-t border-white/10">
        <p class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-200/60 mb-4">Project Lead</p>
        <div class="flex items-center gap-4">
          <div
            class="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center text-xl shadow-inner backdrop-blur-sm text-white">
            👨‍💻</div>
          <div>
            <p class="text-base font-bold text-white tracking-tight">Shobhit Maurya</p>
            <div class="flex gap-4 mt-1">
              <a href="https://github.com/shobhit-maurya-dev" target="_blank"
                class="text-xs font-semibold text-blue-200/60 hover:text-white transition-colors flex items-center gap-1.5 group">
                <i class="bi bi-github group-hover:scale-110 transition-transform"></i> GitHub
              </a>
              <a href="https://linkedin.com/in/shobhit-maurya-1260b4319" target="_blank"
                class="text-xs font-semibold text-blue-200/60 hover:text-white transition-colors flex items-center gap-1.5 group">
                <i class="bi bi-linkedin group-hover:scale-110 transition-transform"></i> LinkedIn
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Panel — Form -->
  <div
    class="flex-1 flex flex-col items-center justify-center p-6 sm:p-12 bg-white dark:bg-slate-900 border-l border-slate-100 dark:border-slate-800/50">
    <div class="w-full max-w-[380px] space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">

      <!-- Mobile Logo (Shown only on small screens) -->
      <div class="lg:hidden flex justify-center mb-8">
        <div
          class="w-16 h-16 rounded-2xl bg-blue-600 flex items-center justify-center text-3xl shadow-xl shadow-blue-500/20 text-white">
          <i class="bi bi-stack"></i>
        </div>
      </div>

      <div class="text-center lg:text-left">
        <h2 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Welcome Back</h2>
      </div>

      <!-- Error Alert -->
      <div *ngIf="errorMessage"
        class="p-4 bg-red-50 dark:bg-red-500/10 border border-red-100 dark:border-red-500/20 rounded-2xl flex items-center gap-3 text-red-600 dark:text-red-400 text-sm font-semibold animate-in zoom-in-95 duration-300">
        <i class="bi bi-exclamation-circle-fill text-lg"></i>
        <span class="flex-1">{{ errorMessage }}</span>
        <button (click)="errorMessage = ''" class="hover:opacity-70 transition-opacity">
          <i class="bi bi-x-lg text-xs"></i>
        </button>
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-5">
        <!-- Email -->
        <div class="space-y-2">
          <label class="text-[10px] font-black text-slate-400 dark:text-slate-300 uppercase tracking-[0.2em] px-1">Email
            Address</label>
          <div class="relative group">
            <span
              class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors">
              <i class="bi bi-envelope"></i>
            </span>
            <input type="email" name="email" [(ngModel)]="loginData.email" required email #emailInput="ngModel"
              class="w-full pl-11 pr-4 py-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-800 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-medium text-slate-700 dark:text-white"
              placeholder="name@company.com">
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <div class="flex justify-between items-center px-1">
            <label
              class="text-[10px] font-black text-slate-400 dark:text-slate-300 uppercase tracking-[0.2em]">Password</label>
            <a routerLink="/forgot-password"
              class="text-[10px] font-bold text-blue-600 hover:text-blue-700 uppercase tracking-wider">Forgot?</a>
          </div>
          <div class="relative group">
            <span
              class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors">
              <i class="bi bi-shield-lock"></i>
            </span>
            <input [type]="showPassword ? 'text' : 'password'" name="password" [(ngModel)]="loginData.password" required
              #passwordInput="ngModel"
              class="w-full pl-11 pr-12 py-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-800 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-medium text-slate-700 dark:text-white"
              placeholder="••••••••">
            <button type="button" (click)="togglePassword()"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
              <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" [disabled]="isLoading || loginForm.invalid"
          class="w-full py-4 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-black rounded-2xl shadow-xl shadow-blue-500/25 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2 uppercase tracking-widest text-xs">
          <span *ngIf="isLoading"
            class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          {{ isLoading ? 'Verifying...' : 'Sign In' }}
        </button>
      </form>

      <div class="pt-6 border-t border-slate-100 dark:border-slate-800">
        <p class="text-center text-sm font-medium text-slate-500 dark:text-slate-400">
          New to TaskFlow?
          <a routerLink="/register" class="text-blue-600 font-black hover:underline underline-offset-4">Create
            account</a>
        </p>
      </div>

      <!-- Mobile Developer Credit -->
      <div class="lg:hidden text-center space-y-4 pt-10">
        <div class="w-12 h-1 bg-slate-100 dark:bg-slate-800 mx-auto rounded-full"></div>
        <div>
          <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3">Project Lead</p>
          <p class="text-sm font-bold text-slate-900 dark:text-white">Ankit Kumar</p>
          <div class="flex justify-center gap-6 mt-2">
            <a href="https://github.com/Ankitkumar341" target="_blank"
              class="text-slate-400 hover:text-blue-600 transition-colors">
              <i class="bi bi-github text-xl"></i>
            </a>
            <a href="https://linkedin.com/in/ankitkumar341" target="_blank"
              class="text-slate-400 hover:text-blue-600 transition-colors">
              <i class="bi bi-linkedin text-xl"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
