<div class="bg-white/70 dark:bg-slate-900/40 backdrop-blur-xl border border-slate-200/50 dark:border-white/5 rounded-3xl p-5 shadow-sm">
  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-blue-500/10 flex items-center justify-center text-blue-600">
        <i class="bi bi-clock-history text-sm"></i>
      </div>
      <h6 class="text-[10px] font-black text-slate-800 dark:text-white uppercase tracking-widest">Activity Feed</h6>
    </div>
    <button class="p-2 rounded-xl text-slate-400 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-500/10 transition-all active:scale-95" 
            (click)="refresh()" [disabled]="isLoading">
      <i class="bi bi-arrow-clockwise text-sm" [class.animate-spin]="isLoading"></i>
    </button>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="flex flex-col items-center justify-center py-10 space-y-3">
    <div class="w-6 h-6 border-2 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Syncing...</span>
  </div>

  <!-- Activity List -->
  <div *ngIf="!isLoading" class="space-y-1">
    <div *ngIf="activities.length === 0" class="flex flex-col items-center justify-center py-12 text-center opacity-40">
      <i class="bi bi-inboxes text-3xl mb-3"></i>
      <p class="text-[10px] font-black uppercase tracking-widest">No activity recorded</p>
    </div>

    <div class="relative">
      <!-- Vertical Line -->
      <div class="absolute left-4 top-2 bottom-2 w-px bg-slate-100 dark:bg-white/5" *ngIf="activities.length > 1"></div>

      <div *ngFor="let activity of activities" class="relative flex gap-4 py-3 group">
        <!-- Status Indicator Icon -->
        <div class="relative z-10 w-8 h-8 rounded-xl border flex-shrink-0 flex items-center justify-center transition-transform group-hover:scale-110"
             [ngClass]="getActionCircleClass(activity.actionCode)">
          <i class="bi" [ngClass]="getActionIcon(activity.actionCode)" style="font-size:0.8rem;"></i>
        </div>

        <!-- Content Body -->
        <div class="flex-grow pt-0.5">
          <div class="flex flex-col">
            <p class="text-[11px] leading-relaxed text-slate-600 dark:text-slate-300">
              <span class="font-black text-slate-900 dark:text-white mr-1">{{ activity.actorName || 'System' }}</span>
              <span class="font-medium opacity-80">{{ activity.message }}</span>
            </p>
            <div class="flex items-center gap-2 mt-1">
              <span class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">
                {{ activity.createdAt | relativeTime }}
              </span>
              <div class="w-1 h-1 rounded-full bg-slate-200 dark:bg-white/10"></div>
              <span class="text-[8px] font-bold px-1.5 py-0.5 rounded bg-slate-100 dark:bg-white/5 text-slate-500 uppercase tracking-tighter">
                {{ formatActionCode(activity.actionCode) }}
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
