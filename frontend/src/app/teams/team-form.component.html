<div class="card mx-auto" style="max-width:600px;">
  <div class="card-body">
    <h3 class="card-title mb-3">{{ isEdit ? 'Edit Team' : 'Create Team' }}</h3>

    <form (ngSubmit)="save()">
      <div class="mb-3">
        <label class="form-label">Team Name <span class="text-danger">*</span></label>
        <input class="form-control" [(ngModel)]="name" name="name" required placeholder="e.g. Backend Team" />
      </div>

      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" [(ngModel)]="description" name="description" rows="3" placeholder="Optional"></textarea>
      </div>

      <div class="d-flex justify-content-end gap-2">
        <a class="btn btn-outline-secondary" routerLink="/teams">Cancel</a>
        <button class="btn btn-primary" type="submit" [disabled]="isSaving">
          <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2" role="status"></span>
          {{ isEdit ? 'Update' : 'Create' }}
        </button>
      </div>
    </form>
  </div>
</div>
